<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Puzzle</title>

<link rel="manifest" href="manifest.json">

<style>

body{
background:black;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
margin-top:40px;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("home-made-parade-nanahira.gif") center/cover no-repeat;
z-index:-2;
}

#board{
display:grid;
grid-template-columns:80px 80px 80px;
gap:6px;
margin:20px;
}

.tile{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
background:rgba(255,105,180,0.9);
color:white;
border-radius:8px;
cursor:pointer;
transition:0.15s;
}

.correct{
background:orange;
}

.empty{
background:transparent;
cursor:default;
}

.stats{
font-size:20px;
}

</style>
</head>

<body>

<h1>8 Puzzle</h1>

<div class="stats">
Time: <span id="time">0.0</span>s |
Moves: <span id="moves">0</span>
</div>

<div id="board"></div>

<div>
Best Time: <span id="bestTime">-</span><br>
Best Moves: <span id="bestMoves">-</span>
</div>

<script>

let board=[1,2,3,4,5,6,7,8,0]
let moves=0
let startTime=null
let timer=null
let solved=true

function draw(){

const boardDiv=document.getElementById("board")
boardDiv.innerHTML=""

board.forEach((n,i)=>{

const d=document.createElement("div")

if(n===0){
d.className="tile empty"
}else{

let correct = n===i+1
d.className="tile"+(correct?" correct":"")

d.textContent=n
d.onclick=()=>move(i)

}

boardDiv.appendChild(d)

})

}

function move(i){

const empty=board.indexOf(0)

const x=i%3
const y=Math.floor(i/3)

const ex=empty%3
const ey=Math.floor(empty/3)

if(Math.abs(x-ex)+Math.abs(y-ey)!==1) return

if(solved){
resetRun()
}

board[empty]=board[i]
board[i]=0

moves++
document.getElementById("moves").textContent=moves

if(!startTime){
startTimer()
}

draw()

checkSolved()

}

function resetRun(){

moves=0
document.getElementById("moves").textContent=0

document.getElementById("time").textContent="0.0"

clearInterval(timer)
startTime=null

solved=false

}

function shuffle(){

board=[1,2,3,4,5,6,7,8,0]

for(let i=0;i<200;i++){

const empty=board.indexOf(0)

const neighbors=[]

const x=empty%3
const y=Math.floor(empty/3)

if(x>0) neighbors.push(empty-1)
if(x<2) neighbors.push(empty+1)
if(y>0) neighbors.push(empty-3)
if(y<2) neighbors.push(empty+3)

const r=neighbors[Math.floor(Math.random()*neighbors.length)]

board[empty]=board[r]
board[r]=0

}

draw()

}

function startTimer(){

startTime=Date.now()

timer=setInterval(()=>{

const t=(Date.now()-startTime)/1000
document.getElementById("time").textContent=t.toFixed(1)

},100)

}

function isSolved(){

for(let i=0;i<8;i++){
if(board[i]!==i+1) return false
}

return board[8]===0

}

function checkSolved(){

if(isSolved()){

clearInterval(timer)

const time=parseFloat(document.getElementById("time").textContent)

let bestTime=localStorage.getItem("bestTime")
let bestMoves=localStorage.getItem("bestMoves")

if(!bestTime || time<bestTime){
localStorage.setItem("bestTime",time)
}

if(!bestMoves || moves<bestMoves){
localStorage.setItem("bestMoves",moves)
}

document.getElementById("bestTime").textContent=localStorage.getItem("bestTime")
document.getElementById("bestMoves").textContent=localStorage.getItem("bestMoves")

solved=true

setTimeout(()=>{
shuffle()
},700)

}

}

function loadBest(){

document.getElementById("bestTime").textContent=localStorage.getItem("bestTime")||"-"
document.getElementById("bestMoves").textContent=localStorage.getItem("bestMoves")||"-"

}

draw()
loadBest()
shuffle()

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
