<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8 Puzzle</title>

<style>

body{
margin:0;
color:white;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("home-made-parade-nanahira.gif");
background-size:cover;
background-position:center;
z-index:-3;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0.8;
z-index:-2;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

#board{
display:grid;
grid-template-columns:80px 80px 80px;
gap:6px;
margin:20px;
touch-action:none;
}

.tile{
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
background:rgba(255,105,180,0.9);
color:white;
border-radius:10px;
cursor:pointer;
transition:transform 0.15s, background 0.2s;
}

.correct{
background:rgba(255,165,0,0.9);
}

.empty{
background:rgba(0,0,0,0.2);
cursor:default;
}

</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>
<canvas id="particles"></canvas>

<h1>8 Puzzle</h1>

<div>
Time: <span id="time">0.0</span>s |
Moves: <span id="moves">0</span>
</div>

<div>
Optimal: <span id="optimal">-</span> moves
</div>

<div id="board"></div>

<script>

let board=[1,2,3,4,5,6,7,8,0]
let moves=0
let startTime=null
let timer=null
let solved=true

const goal="123456780"

/* ---------- 描画 ---------- */

function draw(){

const boardDiv=document.getElementById("board")
boardDiv.innerHTML=""

board.forEach((n,i)=>{

const d=document.createElement("div")

if(n===0){
d.className="tile empty"
}else{

d.className="tile"
d.textContent=n

if(n===i+1){
d.classList.add("correct")
}

d.onclick=()=>move(i)

}

boardDiv.appendChild(d)

})

}

/* ---------- 移動 ---------- */

function move(i){

const empty=board.indexOf(0)

const x=i%3
const y=Math.floor(i/3)

const ex=empty%3
const ey=Math.floor(empty/3)

if(Math.abs(x-ex)+Math.abs(y-ey)!==1) return

if(solved) resetRun()

board[empty]=board[i]
board[i]=0

moves++
document.getElementById("moves").textContent=moves

if(!startTime) startTimer()

draw()
checkSolved()

}

/* ---------- シャッフル ---------- */

function shuffle(){

board=[1,2,3,4,5,6,7,8,0]

for(let i=0;i<200;i++){

const empty=board.indexOf(0)

const neighbors=[]

const x=empty%3
const y=Math.floor(empty/3)

if(x>0) neighbors.push(empty-1)
if(x<2) neighbors.push(empty+1)
if(y>0) neighbors.push(empty-3)
if(y<2) neighbors.push(empty+3)

const r=neighbors[Math.floor(Math.random()*neighbors.length)]

board[empty]=board[r]
board[r]=0

}

draw()
calcOptimal()

}

/* ---------- タイマー ---------- */

function startTimer(){

startTime=Date.now()

timer=setInterval(()=>{

const t=(Date.now()-startTime)/1000
document.getElementById("time").textContent=t.toFixed(1)

},100)

}

function resetRun(){

moves=0
document.getElementById("moves").textContent=0
document.getElementById("time").textContent="0.0"

clearInterval(timer)
startTime=null
solved=false

}

/* ---------- 完成チェック ---------- */

function isSolved(){

for(let i=0;i<8;i++){
if(board[i]!==i+1) return false
}

return true

}

function checkSolved(){

if(isSolved()){

clearInterval(timer)
solved=true

setTimeout(()=>{
shuffle()
},700)

}

}

/* ---------- 最短手数計算 ---------- */

function calcOptimal(){

const start=board.join("")
const queue=[[start,0]]
const visited=new Set([start])

while(queue.length){

const [state,depth]=queue.shift()

if(state===goal){

document.getElementById("optimal").textContent=depth
return

}

const zero=state.indexOf("0")

const moves=[]

const x=zero%3
const y=Math.floor(zero/3)

if(x>0) moves.push(zero-1)
if(x<2) moves.push(zero+1)
if(y>0) moves.push(zero-3)
if(y<2) moves.push(zero+3)

for(const m of moves){

const arr=state.split("")
;[arr[zero],arr[m]]=[arr[m],arr[zero]]

const next=arr.join("")

if(!visited.has(next)){
visited.add(next)
queue.push([next,depth+1])
}

}

}

}

/* ---------- 矢印キー ---------- */

document.addEventListener("keydown",function(e){

const empty=board.indexOf(0)

const x=empty%3
const y=Math.floor(empty/3)

if(e.key==="ArrowUp" && y<2) move(empty+3)
if(e.key==="ArrowDown" && y>0) move(empty-3)
if(e.key==="ArrowLeft" && x<2) move(empty+1)
if(e.key==="ArrowRight" && x>0) move(empty-1)

})

/* ---------- スワイプ操作 ---------- */

let startX=0
let startY=0

const boardDiv=document.getElementById("board")

boardDiv.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

boardDiv.addEventListener("touchend",e=>{

const dx=e.changedTouches[0].clientX-startX
const dy=e.changedTouches[0].clientY-startY

const empty=board.indexOf(0)

const x=empty%3
const y=Math.floor(empty/3)

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30 && x>0) move(empty-1)
if(dx<-30 && x<2) move(empty+1)

}else{

if(dy>30 && y>0) move(empty-3)
if(dy<-30 && y<2) move(empty+3)

}

})

draw()
shuffle()

/* ---------- 粉エフェクト ---------- */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

let particles=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()
window.addEventListener("resize",resize)

for(let i=0;i<60;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speed:Math.random()*1+0.3,
drift:Math.random()*2-1
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.y-=p.speed
p.x+=Math.sin(Date.now()*0.001+p.y)*0.3 + p.drift*0.05

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.4)"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
